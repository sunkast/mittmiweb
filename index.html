<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take The MITTs Off and Go Here & There</title>
    
    <!-- Google Font Import: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: url('background.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            text-align: center;
            padding: 1rem;
        }
		
        .card {
            background: rgba(18, 18, 20, 0.65);
            padding: 3rem 2rem;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 480px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-headline {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            margin-top: 2rem;
            background: linear-gradient(180deg, #ffffff 0%, #e2e8f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px 28px;
            margin-bottom: 1.5rem;
            background-color: #ffe171;
            color: #000000;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .btn:hover {
            background-color: #eec838;

        }

        .qr-code {
            width: 180px;
            height: 180px;
            border-radius: 12px;
            padding: 8px;
            background-color: #ffffff;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="qrcode.svg" alt="Scan QR Code" class="qr-code">
        <h1 class="hero-headline">Take The MITTs Off and Go Here & There</h1>
        <a href="https://go.heretheremi.org/mitt" class="btn">Explore Now</a>
    </div>

</body>
</html>
